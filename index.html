<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Klink-Eberhard - Rechenhilfe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>KLINK-EBERHARD</h1>
            <p>Rechenhilfe</p>
        </header>

        <!-- TOP BAR: BON + WECHSELGELD BUTTONS -->
        <div class="top-buttons">
            <button class="btn-bon" onclick="openBon()">BON</button>
            <button class="btn-wechsel" onclick="openWechsel()">WECHSELGELD</button>
        </div>

        <!-- MAIN CONTENT -->
        <main class="main">
            <div class="section-header">
                <h2>AUSWAHL</h2>
                <button class="btn-settings" onclick="openSettings()">⚙️</button>
            </div>

            <div class="category">
                <h3>GETRÄNKE</h3>
                <div class="buttons-grid" id="drinks-buttons"></div>
            </div>

            <div class="category">
                <h3>ESSEN</h3>
                <div class="buttons-grid" id="food-buttons"></div>
            </div>

            <div class="category">
                <h3>PFAND</h3>
                <div class="buttons-grid" id="pfand-buttons"></div>
            </div>
        </main>

        <!-- POPUP BON -->
        <div id="bon-popup" class="popup hidden">
            <div class="popup-content">
                <div class="popup-header">
                    <h2>BON</h2>
                    <p class="receipt-time" id="receipt-time">--:--</p>
                    <button class="popup-close" onclick="closeBon()">&times;</button>
                </div>

                <div class="receipt-items" id="receipt-items">
                    <p class="receipt-empty">Keine Artikel</p>
                </div>

                <div class="receipt-divider"></div>

                <div class="receipt-summary">
                    <div class="summary-line">
                        <span>SUMME:</span>
                        <span id="total-price" class="amount">0,00 €</span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="clear-btn" class="btn btn-danger">LÖSCHEN</button>
                    <button id="print-btn" class="btn btn-primary">DRUCK</button>
                </div>
            </div>
        </div>

        <!-- POPUP WECHSELGELD -->
        <div id="wechsel-popup" class="popup hidden">
            <div class="popup-wechsel">
                <div class="popup-header-wechsel">
                    <h3>Wechselgeld</h3>
                    <button class="popup-close" onclick="closeWechsel()">&times;</button>
                </div>

                <!-- ZUSAMMENFASSUNG OBEN -->
                <div class="wechsel-summary">
                    <div class="summary-item">
                        <span>SUMME:</span>
                        <span id="wechsel-sum" class="summary-value">0,00 €</span>
                    </div>
                    <div class="summary-item">
                        <span>GEGEBEN:</span>
                        <span id="wechsel-given" class="summary-value">0,00 €</span>
                    </div>
                    <div class="summary-item highlight">
                        <span>ZURÜCK:</span>
                        <span id="wechsel-change" class="summary-value">0,00 €</span>
                    </div>
                </div>

                <!-- NUMMERNFELD -->
                <div class="wechsel-input-section">
                    <label>Erhaltener Betrag:</label>
                    <div class="wechsel-input-display" id="wechsel-display">0,00 €</div>
                </div>

                <!-- ZAHLENPAD -->
                <div class="number-pad">
                    <button onclick="addWechselNumber('1')">1</button>
                    <button onclick="addWechselNumber('2')">2</button>
                    <button onclick="addWechselNumber('3')">3</button>
                    <button onclick="addWechselNumber('4')">4</button>
                    <button onclick="addWechselNumber('5')">5</button>
                    <button onclick="addWechselNumber('6')">6</button>
                    <button onclick="addWechselNumber('7')">7</button>
                    <button onclick="addWechselNumber('8')">8</button>
                    <button onclick="addWechselNumber('9')">9</button>
                    <button class="btn-dot" onclick="addWechselNumber(',')">0,00</button>
                    <button onclick="addWechselNumber('0')">0</button>
                    <button class="btn-delete" onclick="deleteWechselNumber()">⌫</button>
                </div>

                <div class="popup-footer-wechsel">
                    <button class="btn-confirm" onclick="confirmWechsel()">BESTÄTIGEN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Produkte verwalten</h3>
                <button onclick="closeSettings()" class="close-btn">&times;</button>
            </div>

            <div class="modal-tabs">
                <button class="tab-btn active" onclick="switchTab('list')">LISTE</button>
                <button class="tab-btn" onclick="switchTab('add')">NEU</button>
            </div>

            <div id="tab-list" class="tab-content active">
                <div id="products-list"></div>
            </div>

            <div id="tab-add" class="tab-content">
                <input type="text" id="new-name" placeholder="Name" class="input-field">
                <input type="number" id="new-price" placeholder="Preis" step="0.01" class="input-field">
                <select id="new-category" class="input-field">
                    <option value="Getränke">Getränke</option>
                    <option value="Essen">Essen</option>
                    <option value="Pfand">Pfand</option>
                </select>
                <button onclick="addProduct()" class="btn-add">HINZUFÜGEN</button>
            </div>

            <button onclick="closeSettings()" class="btn-close-modal">SCHLIESSEN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
